<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>word chain snake admin</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f3ea;
      --ink: #202327;
      --muted: #68707a;
      --panel: #fffdf8;
      --line: #d8d0c3;
      --accent: #197278;
      --danger: #c44536;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
    }

    main {
      width: min(100%, 720px);
      margin: 0 auto;
      padding: 18px;
      display: grid;
      gap: 14px;
    }

    h1 {
      margin: 0;
      font-size: 2rem;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.55;
      font-weight: 700;
    }

    .panel,
    .item {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 14px;
    }

    .auth {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 8px;
    }

    input,
    button {
      min-height: 44px;
      border-radius: 8px;
      font: inherit;
      font-weight: 800;
    }

    input {
      min-width: 0;
      border: 1px solid var(--line);
      padding: 0 11px;
      background: #fff;
      color: var(--ink);
    }

    button {
      border: 1px solid #59656f;
      padding: 0 12px;
      background: #fff;
      color: var(--ink);
      cursor: pointer;
    }

    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    button.warn {
      border-color: var(--danger);
      color: var(--danger);
    }

    .list {
      display: grid;
      gap: 8px;
    }

    .item {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto auto;
      gap: 8px;
      align-items: center;
    }

    .word {
      min-width: 0;
      font-size: 1.25rem;
      font-weight: 900;
      overflow-wrap: anywhere;
    }

    .meta {
      display: block;
      margin-top: 3px;
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 700;
    }

    .status {
      min-height: 1.4em;
      color: var(--accent);
      font-weight: 800;
    }

    .status.error {
      color: var(--danger);
    }

    @media (max-width: 520px) {
      .auth,
      .item {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>word chain snake admin</h1>
      <p>사용자가 제안한 단어를 검토하고 승인합니다. 같은 단어는 서버에서 하나의 대기 항목으로 합쳐집니다.</p>
    </header>

    <section class="panel">
      <div class="auth">
        <input id="apiInput" type="url" placeholder="제안 서버 URL">
        <input id="tokenInput" type="password" placeholder="관리자 토큰">
        <button id="loadBtn" class="primary" type="button">불러오기</button>
      </div>
    </section>

    <p id="status" class="status"></p>
    <section id="list" class="list" aria-label="pending word suggestions"></section>
  </main>

  <script src="public/suggest-config.js"></script>
  <script>
    const els = {
      apiInput: document.querySelector("#apiInput"),
      tokenInput: document.querySelector("#tokenInput"),
      loadBtn: document.querySelector("#loadBtn"),
      status: document.querySelector("#status"),
      list: document.querySelector("#list")
    };

    const savedApi = localStorage.getItem("wordsnakeAdminApi") || window.WORDSNAKE_SUGGEST_API || "";
    els.apiInput.value = savedApi;
    els.tokenInput.value = localStorage.getItem("wordsnakeAdminToken") || "";

    function apiBase() {
      return els.apiInput.value.trim().replace(/\/+$/, "");
    }

    function token() {
      return els.tokenInput.value.trim();
    }

    function setStatus(message, isError = false) {
      els.status.textContent = message;
      els.status.classList.toggle("error", isError);
    }

    async function request(path, options = {}) {
      const base = apiBase();
      if (!base) throw new Error("제안 서버 URL을 입력하세요.");
      if (!token()) throw new Error("관리자 토큰을 입력하세요.");
      const response = await fetch(`${base}${path}`, {
        ...options,
        headers: {
          "Authorization": `Bearer ${token()}`,
          "Content-Type": "application/json",
          ...(options.headers || {})
        }
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || "요청에 실패했습니다.");
      return data;
    }

    function renderItems(items) {
      els.list.innerHTML = "";
      if (!items.length) {
        els.list.innerHTML = '<p class="panel">승인 대기 중인 단어가 없습니다.</p>';
        return;
      }

      for (const item of items) {
        const row = document.createElement("article");
        row.className = "item";
        row.innerHTML = `
          <div>
            <strong class="word"></strong>
            <span class="meta"></span>
          </div>
          <button class="primary approve" type="button">승인</button>
          <button class="warn reject" type="button">거절</button>
        `;
        row.querySelector(".word").textContent = item.word;
        const lang = item.lang || "ko";
        row.querySelector(".meta").textContent = `${lang.toUpperCase()} · 제안 ${item.count || 1}회 · ${item.updatedAt || item.createdAt || ""}`;
        row.querySelector(".approve").addEventListener("click", () => decide(item.word, "approve", lang));
        row.querySelector(".reject").addEventListener("click", () => decide(item.word, "reject", lang));
        els.list.appendChild(row);
      }
    }

    async function loadPending() {
      localStorage.setItem("wordsnakeAdminApi", apiBase());
      localStorage.setItem("wordsnakeAdminToken", token());
      setStatus("불러오는 중...");
      try {
        const data = await request("/admin/suggestions?status=pending");
        renderItems(data.items || []);
        setStatus(`대기 ${Number(data.items?.length || 0).toLocaleString("ko-KR")}개`);
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    async function decide(word, action, lang = "ko") {
      setStatus(`${word} 처리 중...`);
      try {
        await request(`/admin/suggestions/${encodeURIComponent(word)}/${action}?lang=${encodeURIComponent(lang)}`, { method: "POST" });
        await loadPending();
      } catch (error) {
        setStatus(error.message, true);
      }
    }

    els.loadBtn.addEventListener("click", loadPending);
  </script>
</body>
</html>
